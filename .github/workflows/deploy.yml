name: Auto Generate and Deploy Dashboard

on: 
  schedule:
    # 每天 01:00 UTC (台灣時間 09:00) 與 07:00 UTC (台灣時間 15:00)
    - cron: '0 1,7 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # 或其他您偏好的版本

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests beautifulsoup4 pydantic

      - name: Weekly Topic Recommendation (Monday Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python step0_recommend_topics.py
          if [ -f "topic_recommendation.md" ]; then
            gh issue create --title "💡 每週主題建議報告 $(date +'%Y-%m-%d')" --body-file topic_recommendation.md || echo "Failed to create issue (perhaps issue already exists or lack of permissions)"
          fi

      - name: Archive Current Dashboard
        run: |
          python step4_archive.py

      - name: Generate Intelligence Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python step1_generate.py

      - name: Crawl Images
        run: |
          python step2_crawl.py

      - name: Render HTML Dashboard
        run: |
          python step3_render.py
          # 為了方便 GitHub Pages 讀取，將結果覆蓋到 index.html
          cp daily_dashboard_rendered.html index.html

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Global Strategic Briefing Dashboard & Archive"
          branch: main
          file_pattern: '*.json *.html archive/*.txt topic_recommendation.md'